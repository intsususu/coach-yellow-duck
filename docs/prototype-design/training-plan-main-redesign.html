<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>训练计划 · 主页面重设计</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1a1f29;
      --secondary: #6b7280;
      --muted: #9aa1ab;
      --hairline: #ededf0;
      --orange: #ea580c;
      --orange-soft: #fff4ed;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .screen {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px 16px 72px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 44px;
      margin-bottom: 10px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .search-button {
      height: 34px;
      padding: 0 14px;
      border-radius: 17px;
      color: var(--secondary);
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      font-size: 13px;
      font-weight: 720;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border-radius: 18px;
      background: #e9ebef;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .mode-button {
      height: 38px;
      border-radius: 14px;
      color: var(--secondary);
      font-size: 14px;
      font-weight: 760;
    }

    .mode-button.is-active {
      color: var(--text);
      background: var(--card);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
    }

    .hero {
      margin-top: 14px;
      padding: 18px;
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .hero-kicker {
      color: var(--orange);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .hero-title {
      margin: 8px 0 0;
      font-size: 25px;
      line-height: 1.16;
      font-weight: 850;
    }

    .hero-copy {
      margin: 7px 0 0;
      color: var(--secondary);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 620;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .stat {
      min-height: 58px;
      padding: 10px;
      border-radius: 14px;
      background: var(--bg);
    }

    .stat strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 1.05;
      font-weight: 850;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 680;
      white-space: nowrap;
    }

    .section {
      margin-top: 20px;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 850;
    }

    .section-head span,
    .section-head button {
      color: var(--muted);
      font-size: 13px;
      font-weight: 720;
      white-space: nowrap;
    }

    .rail {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .rail::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      height: 34px;
      padding: 0 14px;
      border-radius: 17px;
      color: var(--secondary);
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      font-size: 13px;
      font-weight: 720;
      white-space: nowrap;
    }

    .chip.is-active {
      color: white;
      background: var(--orange);
      box-shadow: none;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .cat-cell {
      flex: none;
      height: 38px;
      padding: 0 4px;
      text-align: center;
    }

    .filter-tabs {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 1px;
      border-bottom: 1px solid var(--hairline);
      -webkit-overflow-scrolling: touch;
    }

    .filter-tabs::-webkit-scrollbar {
      display: none;
    }

    .filter-tab {
      flex: 0 0 auto;
      position: relative;
      height: 36px;
      padding: 0 1px;
      color: var(--secondary);
      font-size: 14px;
      font-weight: 720;
      white-space: nowrap;
    }

    .filter-tab.is-active {
      color: var(--orange);
      font-weight: 820;
    }

    .filter-tab.is-active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      border-radius: 2px;
      background: var(--orange);
    }

    .plan-rail {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .plan-rail::-webkit-scrollbar {
      display: none;
    }

    .plan-card {
      flex: 0 0 244px;
      min-height: 132px;
      padding: 14px;
      border-radius: 18px;
      text-align: left;
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      scroll-snap-align: start;
    }

    .plan-card.is-selected {
      box-shadow: inset 0 0 0 1px rgba(234, 88, 12, 0.38), 0 8px 22px rgba(15, 23, 42, 0.06);
    }

    .plan-card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 850;
    }

    .plan-card p {
      margin: 5px 0 0;
      color: var(--secondary);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 620;
    }

    .plan-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .micro {
      display: inline-flex;
      min-height: 25px;
      align-items: center;
      padding: 0 8px;
      border-radius: 9px;
      color: var(--secondary);
      background: var(--bg);
      font-size: 11px;
      font-weight: 760;
    }

    .micro.primary {
      color: var(--orange);
      background: var(--orange-soft);
    }

    .dots {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #d8dde6;
    }

    .dot.on {
      background: currentColor;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .exercise-card {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 12px;
      min-height: 104px;
      padding: 10px;
      border-radius: 18px;
      text-align: left;
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
    }

    .exercise-card:active,
    .plan-card:active {
      transform: scale(0.99);
    }

    .thumb {
      width: 104px;
      height: 84px;
      overflow: hidden;
      border-radius: 14px;
      background: var(--orange-soft);
    }

    .thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .exercise-copy {
      min-width: 0;
      padding: 4px 0;
    }

    .exercise-copy h3 {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      line-height: 1.2;
      font-weight: 820;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .exercise-copy p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      min-height: 23px;
      align-items: center;
      padding: 0 8px;
      border-radius: 8px;
      color: var(--secondary);
      background: var(--bg);
      font-size: 11px;
      line-height: 1;
      font-weight: 740;
    }

    .tag.primary {
      color: var(--orange);
      background: var(--orange-soft);
    }

    .text-list {
      display: grid;
      gap: 8px;
    }

    .text-card {
      padding: 14px;
      border-radius: 16px;
      text-align: left;
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
    }

    .text-card h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 780;
    }

    .text-card p {
      margin: 6px 0 0;
      color: var(--secondary);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 620;
    }

    .text-card .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .bottom-note {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 8;
      padding: 10px 16px max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(237, 237, 240, 0.92);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 620;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 64px;
      z-index: 20;
      transform: translateX(-50%) translateY(18px);
      width: min(calc(100% - 32px), 360px);
      padding: 12px 14px;
      border-radius: 16px;
      color: var(--text);
      background: var(--card);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-size: 13px;
      font-weight: 720;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .search-sheet {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      background: rgba(15, 23, 42, 0.18);
    }

    .search-sheet.is-open {
      display: block;
    }

    .sheet-panel {
      width: min(100%, 430px);
      margin: 0 auto;
      min-height: 100%;
      padding: 18px 16px;
      background: var(--bg);
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search-input {
      flex: 1 1 auto;
      height: 42px;
      min-width: 0;
      padding: 0 14px;
      border: 0;
      border-radius: 21px;
      outline: none;
      color: var(--text);
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      font-size: 14px;
      font-weight: 650;
    }

    .cancel-button {
      flex: 0 0 auto;
      height: 38px;
      padding: 0 8px;
      color: var(--orange);
      font-size: 14px;
      font-weight: 760;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 374px) {
      .screen {
        padding-inline: 12px;
      }

      .exercise-card {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .thumb {
        width: 96px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <h1 class="page-title">训练计划</h1>
      <button class="search-button" type="button" data-search-open>搜索</button>
    </header>

    <nav class="mode-switch" aria-label="训练类型">
      <button class="mode-button is-active" type="button" data-mode="strength">力量训练</button>
      <button class="mode-button" type="button" data-mode="stretch">拉伸</button>
      <button class="mode-button" type="button" data-mode="hiit">HIIT</button>
    </nav>

    <section class="hero" data-hero></section>
    <div data-panel></div>
  </main>

  <div class="bottom-note">训练动作仅供参考，请量力而行，必要时在专业指导下进行</div>
  <div class="toast" data-toast></div>

  <aside class="search-sheet" data-search-sheet aria-label="搜索动作">
    <div class="sheet-panel">
      <div class="search-row">
        <input class="search-input" type="search" placeholder="搜索动作、计划、部位" data-search-input>
        <button class="cancel-button" type="button" data-search-close>取消</button>
      </div>
      <section class="section" style="margin-top: 0;">
        <div class="section-head">
          <h2>搜索结果</h2>
          <span data-search-count>0 个</span>
        </div>
        <div class="list" data-search-results></div>
      </section>
    </div>
  </aside>

    const CAT_SHORT = {
      chest: "胸",

    };

    const stretch = {
      title: "拉伸与活动度",
      copy: "按部位进入，卡片更轻，适合训练前后快速查找。",
      parts: ["颈部", "肩部", "胸部", "背部", "髋部", "腿部"],
      moves: [
        { name: "门框胸肌拉伸", copy: "左右各 30 秒", tags: ["胸部", "静态"] },
        { name: "肩前束放松", copy: "左右各 30 秒", tags: ["肩部", "放松"] },
        { name: "猫牛式拉伸", copy: "60 秒", tags: ["背部", "活动度"] },
        { name: "髋屈肌拉伸", copy: "左右各 45 秒", tags: ["髋部", "静态"] }
      ]
    };

    const hiit = {
      title: "HIIT 组合",
      copy: "按强度分层，保留热量估算与循环数，信息密度更适合快速扫读。",
      levels: ["入门", "进阶", "燃脂"],
      workouts: [
        { name: "入门燃脂循环", copy: "开合跳、深蹲、登山跑组合", tags: ["3 循环", "约 15 分钟", "≈ 180 千卡"] },
        { name: "进阶心肺挑战", copy: "波比跳、弓步跳、平板支撑组合", tags: ["4 循环", "约 22 分钟", "≈ 280 千卡"] },
        { name: "核心燃脂短训", copy: "登山跑、俄罗斯转体、卷腹", tags: ["3 循环", "约 18 分钟", "≈ 210 千卡"] }
      ]
    };

    const state = {
      mode: "strength",
      category: "chest",
      filter: "全部",
      planIndex: 0
    };

    const hero = document.querySelector("[data-hero]");
    const panel = document.querySelector("[data-panel]");
    const toast = document.querySelector("[data-toast]");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));
    const searchSheet = document.querySelector("[data-search-sheet]");
    const searchInput = document.querySelector("[data-search-input]");
    const searchResults = document.querySelector("[data-search-results]");
    const searchCount = document.querySelector("[data-search-count]");

    function dots(value) {
      return `<span class="dots" aria-label="${value}/5">${Array.from({ length: 5 }, (_, index) => `<i class="dot${index < value ? " on" : ""}"></i>`).join("")}</span>`;
    }

    function renderHero() {
      if (state.mode === "strength") {
        hero.classList.add("hidden");
        hero.innerHTML = "";
        return;
      }

      hero.classList.remove("hidden");

      if (state.mode === "stretch") {
        hero.innerHTML = `
          <div class="hero-kicker">拉伸</div>
          <h2 class="hero-title">${stretch.title}</h2>
          <p class="hero-copy">${stretch.copy}</p>
          <div class="hero-stats">
            <div class="stat"><strong>${stretch.parts.length}</strong><span>部位</span></div>
            <div class="stat"><strong>${stretch.moves.length}</strong><span>常用动作</span></div>
            <div class="stat"><strong>5</strong><span>分钟起</span></div>
          </div>
        `;
        return;
      }

      hero.innerHTML = `
        <div class="hero-kicker">HIIT</div>
        <h2 class="hero-title">${hiit.title}</h2>
        <p class="hero-copy">${hiit.copy}</p>
        <div class="hero-stats">
          <div class="stat"><strong>${hiit.levels.length}</strong><span>强度</span></div>
          <div class="stat"><strong>${hiit.workouts.length}</strong><span>组合</span></div>
          <div class="stat"><strong>15</strong><span>分钟起</span></div>
        </div>
      `;
    }

    function renderStrength() {
      const current = strength[state.category];
      const filtered = state.filter === "全部"
        ? current.exercises
        : current.exercises.filter((exercise) => exercise.type === state.filter);

      panel.innerHTML = `
        <section class="section">
          <div class="section-head">
            <h2>肌群</h2>
          </div>
          <div class="cat-grid" data-categories>
            ${Object.entries(strength).map(([key, value]) => `
              <button class="chip cat-cell${key === state.category ? " is-active" : ""}" type="button" data-category="${key}">
                ${CAT_SHORT[key] || value.label}
              </button>
            `).join("")}
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>训练计划</h2>
            <button type="button" data-plan-count>${current.plans.length} 套</button>
          </div>
          <div class="plan-rail">
            ${current.plans.map((plan, index) => `
              <button class="plan-card${index === state.planIndex ? " is-selected" : ""}" type="button" data-plan="${index}">
                <h3>${plan.title}</h3>
                <p>${plan.copy}</p>
                <div class="plan-meta">
                  <span class="micro primary">${plan.level}</span>
                  <span class="micro">${plan.duration}</span>
                  <span class="micro">难度 ${dots(plan.difficulty)}</span>
                  <span class="micro">强度 ${dots(plan.intensity)}</span>
                </div>
              </button>
            `).join("")}
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>${current.label}动作</h2>
            <span>${filtered.length} 个</span>
          </div>
          <div class="filter-tabs" data-filters>
            ${current.filters.map((filter) => `
              <button class="filter-tab${filter === state.filter ? " is-active" : ""}" type="button" data-filter="${filter}">${filter}</button>
            `).join("")}
          </div>
          <div class="list" style="margin-top: 12px;">
            ${filtered.map(exerciseCard).join("") || `<div class="text-card"><h3>暂无动作</h3><p>当前筛选没有匹配动作。</p></div>`}
          </div>
        </section>
      `;

      panel.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = button.dataset.category;
          state.filter = "全部";
          state.planIndex = 0;
          render();
        });
      });

      panel.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.filter = button.dataset.filter;
          render();
        });
      });

      panel.querySelectorAll("[data-plan]").forEach((button) => {
        button.addEventListener("click", () => {
          state.planIndex = Number(button.dataset.plan);
          showToast(`${current.plans[state.planIndex].title} 已选中`);
          render();
        });
      });
    }

    function exerciseCard(exercise) {
      return `
        <button class="exercise-card" type="button" data-exercise="${exercise.name}">
          <span class="thumb"><img src="${exercise.image}" alt="${exercise.name} 动作图"></span>
          <span class="exercise-copy">
            <h3>${exercise.name}</h3>
            <p>${exercise.en}</p>
            <span class="tags">
              <span class="tag primary">${exercise.target}</span>
              <span class="tag">${exercise.type}</span>
              <span class="tag">${exercise.level}</span>
            </span>
          </span>
        </button>
      `;
    }

    function renderStretch() {
      panel.innerHTML = `
        <section class="section">
          <div class="section-head">
            <h2>部位</h2>
            <span>${stretch.parts.length} 类</span>
          </div>
          <div class="rail">
            ${stretch.parts.map((part, index) => `<button class="chip${index === 0 ? " is-active" : ""}" type="button">${part}</button>`).join("")}
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2>常用拉伸</h2>
            <span>${stretch.moves.length} 个</span>
          </div>
          <div class="text-list">
            ${stretch.moves.map(textCard).join("")}
          </div>
        </section>
      `;
    }

    function renderHIIT() {
      panel.innerHTML = `
        <section class="section">
          <div class="section-head">
            <h2>强度</h2>
            <span>${hiit.levels.length} 档</span>
          </div>
          <div class="rail">
            ${hiit.levels.map((level, index) => `<button class="chip${index === 0 ? " is-active" : ""}" type="button">${level}</button>`).join("")}
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2>组合训练</h2>
            <span>${hiit.workouts.length} 套</span>
          </div>
          <div class="text-list">
            ${hiit.workouts.map(textCard).join("")}
          </div>
        </section>
      `;
    }

    function textCard(item) {
      return `
        <button class="text-card" type="button">
          <h3>${item.name}</h3>
          <p>${item.copy}</p>
          <span class="tag-row">
            ${item.tags.map((tag, index) => `<span class="tag${index === 0 ? " primary" : ""}">${tag}</span>`).join("")}
          </span>
        </button>
      `;
    }

    function render() {
      modeButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.mode === state.mode);
      });
      renderHero();
      if (state.mode === "strength") renderStrength();
      if (state.mode === "stretch") renderStretch();
      if (state.mode === "hiit") renderHIIT();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function allSearchItems() {
      const strengthItems = Object.values(strength).flatMap((group) => [
        ...group.plans.map((plan) => ({ kind: "计划", name: plan.title, copy: plan.copy, tags: [plan.level, plan.duration] })),
        ...group.exercises.map((exercise) => ({ kind: "动作", name: exercise.name, copy: exercise.en, tags: [exercise.target, exercise.type, exercise.level], image: exercise.image }))
      ]);
      return [
        ...strengthItems,
        ...stretch.moves.map((move) => ({ kind: "拉伸", name: move.name, copy: move.copy, tags: move.tags })),
        ...hiit.workouts.map((workout) => ({ kind: "HIIT", name: workout.name, copy: workout.copy, tags: workout.tags }))
      ];
    }

    function renderSearch(query = "") {
      const normalized = query.trim().toLowerCase();
      const items = allSearchItems().filter((item) => {
        if (!normalized) return true;
        return [item.kind, item.name, item.copy, ...item.tags].join(" ").toLowerCase().includes(normalized);
      }).slice(0, 12);

      searchCount.textContent = `${items.length} 个`;
      searchResults.innerHTML = items.map((item) => item.image
        ? exerciseCard({ name: item.name, en: item.copy, type: item.tags[1], level: item.tags[2], target: item.tags[0], image: item.image })
        : textCard(item)
      ).join("");
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        state.filter = "全部";
        render();
      });
    });

    document.querySelector("[data-search-open]").addEventListener("click", () => {
      searchSheet.classList.add("is-open");
      renderSearch();
      requestAnimationFrame(() => searchInput.focus());
    });

    document.querySelector("[data-search-close]").addEventListener("click", () => {
      searchSheet.classList.remove("is-open");
      searchInput.value = "";
    });

    searchInput.addEventListener("input", () => renderSearch(searchInput.value));
    searchSheet.addEventListener("click", (event) => {
      if (event.target === searchSheet) {
        searchSheet.classList.remove("is-open");
      }
    });

    render();
  </script>
</body>
</html>
