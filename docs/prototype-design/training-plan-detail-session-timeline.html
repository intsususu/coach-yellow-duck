<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>胸部增肌基础 · Session Timeline</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1a1f29;
      --secondary: #6b7280;
      --muted: #9aa1ab;
      --hairline: #ededf0;
      --orange: #ea580c;
      --orange-soft: #fff4ed;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      background: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .screen {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 108px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      margin-bottom: 12px;
    }

    .nav-button {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 18px;
      color: var(--secondary);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(237, 237, 240, 0.9);
    }

    .nav-button span {
      width: 9px;
      height: 9px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg) translateX(1px);
    }

    .more-button {
      display: flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-radius: 18px;
      color: var(--secondary);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(237, 237, 240, 0.9);
    }

    .more-button i {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: currentColor;
    }

    .hero {
      padding: 22px 20px 18px;
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.14;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero-subtitle {
      margin: 8px 0 0;
      color: var(--secondary);
      font-size: 16px;
      line-height: 1.35;
      font-weight: 650;
    }

    .hero-time {
      flex: 0 0 auto;
      min-width: 68px;
      padding-top: 3px;
      text-align: right;
    }

    .hero-time strong {
      display: block;
      color: var(--orange);
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
    }

    .hero-time span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .chip {
      display: inline-flex;
      min-height: 32px;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      border-radius: 16px;
      color: var(--secondary);
      background: #f6f7f9;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .rating-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
      padding: 12px;
      border-radius: 18px;
      background: #f7f8fa;
    }

    .rating-cell {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
    }

    .rating-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 700;
    }

    .stars,
    .bars {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .star {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d8dde6;
    }

    .star.on {
      background: var(--text);
    }

    .bar {
      width: 5px;
      border-radius: 3px;
      background: #d8dde6;
    }

    .bar:nth-child(1) { height: 8px; }
    .bar:nth-child(2) { height: 12px; }
    .bar:nth-child(3) { height: 16px; }
    .bar:nth-child(4) { height: 20px; }
    .bar:nth-child(5) { height: 24px; }

    .bar.on {
      background: var(--orange);
    }

    .audience {
      display: flex;
      align-items: center;
      grid-column: 1 / -1;
      color: var(--secondary);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.4;
    }

    .timeline {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 18px -16px 8px;
      padding: 10px 16px;
      background: rgba(245, 246, 248, 0.86);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
    }

    .timeline-track {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 4px;
      border-radius: 18px;
      background: #e9ebef;
    }

    .timeline-step {
      display: flex;
      height: 36px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 14px;
      color: var(--secondary);
      font-size: 13px;
      font-weight: 750;
    }

    .timeline-step.is-active {
      color: var(--text);
      background: var(--card);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
    }

    .timeline-step b {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }

    .section {
      scroll-margin-top: 72px;
      margin-top: 20px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      color: var(--text);
      font-size: 23px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
    }

    .section-header span,
    .progress-text {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .rail {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      width: 100%;
      padding: 0 0 4px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .rail::-webkit-scrollbar {
      display: none;
    }

    .mini-card {
      flex: 0 0 154px;
      min-height: 120px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      scroll-snap-align: start;
    }

    .mini-dot {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      color: var(--orange);
      background: var(--orange-soft);
      font-size: 15px;
      font-weight: 850;
    }

    .mini-title {
      margin-top: 16px;
      color: var(--text);
      font-size: 17px;
      line-height: 1.24;
      font-weight: 800;
    }

    .mini-value {
      margin-top: 10px;
      color: var(--orange);
      font-size: 16px;
      line-height: 1.2;
      font-weight: 800;
    }

    .training-list {
      display: grid;
      gap: 12px;
    }

    .workout-card {
      display: grid;
      grid-template-columns: 136px minmax(0, 1fr);
      min-height: 154px;
      gap: 14px;
      padding: 12px 14px 12px 12px;
      border-radius: 20px;
      text-align: left;
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .workout-card:active {
      transform: scale(0.99);
    }

    .workout-card.is-done {
      background: #fbfcfb;
      box-shadow: inset 0 0 0 1px rgba(234, 88, 12, 0.28);
    }

    .thumb {
      position: relative;
      min-width: 0;
      min-height: 130px;
      overflow: hidden;
      border-radius: 15px;
      background: #fff7f2;
    }

    .thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .workout-body {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0 2px;
    }

    .workout-copy {
      min-width: 0;
    }

    .exercise-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .exercise-name {
      min-width: 0;
      margin: 0;
      color: var(--text);
      font-size: 20px;
      line-height: 1.15;
      font-weight: 830;
    }

    .status {
      display: grid;
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      place-items: center;
      border-radius: 50%;
      color: transparent;
      box-shadow: inset 0 0 0 1.5px #cfd4dc;
    }

    .workout-card.is-done .status {
      color: #ffffff;
      background: var(--orange);
      box-shadow: none;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 5px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg) translateY(-1px);
    }

    .exercise-english {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.25;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      padding: 0 8px;
      border-radius: 8px;
      color: var(--secondary);
      background: #f4f5f7;
      font-size: 12px;
      line-height: 1;
      font-weight: 750;
    }

    .tag.primary {
      color: var(--orange);
      background: var(--orange-soft);
    }

    .exercise-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.25;
      font-weight: 720;
    }

    .exercise-meta strong {
      color: var(--text);
      font-weight: 820;
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #c9ced8;
    }

    .coach-note {
      margin-top: 14px;
      padding: 16px;
      border-radius: var(--radius);
      color: var(--secondary);
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--hairline);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 650;
    }

    .coach-note strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .bottom-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 10;
      padding: 12px 16px max(12px, env(safe-area-inset-bottom));
      background: rgba(245, 246, 248, 0.9);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border-top: 1px solid rgba(237, 237, 240, 0.92);
    }

    .bottom-inner {
      display: flex;
      width: min(100%, 398px);
      margin: 0 auto;
      align-items: center;
      gap: 12px;
    }

    .progress-pill {
      flex: 1 1 auto;
      min-width: 0;
      color: var(--secondary);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
    }

    .progress-pill strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      font-weight: 850;
    }

    .start-button {
      flex: 0 0 auto;
      min-width: 132px;
      height: 48px;
      padding: 0 18px;
      border-radius: 24px;
      color: white;
      background: var(--orange);
      font-size: 16px;
      font-weight: 820;
      box-shadow: 0 8px 20px rgba(234, 88, 12, 0.26);
    }

    @media (max-width: 374px) {
      .screen {
        padding-inline: 12px;
      }

      .timeline {
        margin-inline: -12px;
        padding-inline: 12px;
      }

      .workout-card {
        grid-template-columns: 124px minmax(0, 1fr);
        min-height: 148px;
      }

      .thumb {
        min-height: 124px;
      }

      .exercise-name {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="topbar">
      <button class="nav-button" aria-label="返回"><span></span></button>
      <button class="more-button" aria-label="更多操作"><i></i><i></i><i></i></button>
    </div>

    <section class="hero" aria-labelledby="page-title">
      <div class="title-row">
        <div>
          <h1 id="page-title">胸部增肌基础</h1>
          <p class="hero-subtitle">推举打底，全面刺激胸大肌</p>
        </div>
        <div class="hero-time">
          <strong>45</strong>
          <span>分钟</span>
        </div>
      </div>

      <div class="meta-line" aria-label="训练概要">
        <span class="chip">胸部</span>
        <span class="chip">入门</span>
        <span class="chip">13 个步骤</span>
        <span class="chip">4 个正式动作</span>
      </div>

      <div class="rating-panel">
        <div class="rating-cell" aria-label="难度 2 星">
          <div class="rating-label">
            <span>难度</span>
            <div class="stars">
              <i class="star on"></i><i class="star on"></i><i class="star"></i><i class="star"></i><i class="star"></i>
            </div>
          </div>
          <div class="exercise-meta"><strong>入门增肌</strong><span class="meta-dot"></span>自由重量</div>
        </div>
        <div class="rating-cell" aria-label="强度 3 星">
          <div class="rating-label">
            <span>强度</span>
            <div class="bars">
              <i class="bar on"></i><i class="bar on"></i><i class="bar on"></i><i class="bar"></i><i class="bar"></i>
            </div>
          </div>
          <div class="exercise-meta"><strong>中等</strong><span class="meta-dot"></span>组间 90 秒</div>
        </div>
        <div class="audience">
          <span>适合人群：入门增肌、自由重量训练</span>
        </div>
      </div>
    </section>

    <nav class="timeline" aria-label="训练阶段">
      <div class="timeline-track">
        <button class="timeline-step is-active" data-jump="warmup"><b></b>热身</button>
        <button class="timeline-step" data-jump="workout"><b></b>正式</button>
        <button class="timeline-step" data-jump="cooldown"><b></b>拉伸</button>
      </div>
    </nav>

    <section class="section" id="warmup">
      <div class="section-header">
        <h2>热身</h2>
        <span>约 5 分钟</span>
      </div>
      <div class="rail" aria-label="热身动作">
        <article class="mini-card">
          <span class="mini-dot">01</span>
          <div class="mini-title">开合跳</div>
          <div class="mini-value">30 秒</div>
        </article>
        <article class="mini-card">
          <span class="mini-dot">02</span>
          <div class="mini-title">手臂绕环</div>
          <div class="mini-value">各 20 圈</div>
        </article>
        <article class="mini-card">
          <span class="mini-dot">03</span>
          <div class="mini-title">扩胸运动</div>
          <div class="mini-value">20 次</div>
        </article>
        <article class="mini-card">
          <span class="mini-dot">04</span>
          <div class="mini-title">跪姿俯卧撑</div>
          <div class="mini-value">2 组</div>
        </article>
      </div>
    </section>

    <section class="section" id="workout">
      <div class="section-header">
        <h2>正式训练</h2>
        <span class="progress-text" data-progress>0 / 4 完成</span>
      </div>

      <div class="training-list">
        <button class="workout-card" type="button" data-workout>
          <div class="thumb">
            <img src="../../HealthApp/Assets.xcassets/Dumbbell%20Bench%20Press.imageset/Dumbbell%20Bench%20Press.png" alt="哑铃卧推动作图">
          </div>
          <div class="workout-body">
            <div class="workout-copy">
              <div class="exercise-top">
                <div>
                  <h3 class="exercise-name">哑铃卧推</h3>
                  <div class="exercise-english">Dumbbell Bench Press</div>
                </div>
                <span class="status" aria-hidden="true"></span>
              </div>
              <div class="tags">
                <span class="tag primary">胸大肌</span>
                <span class="tag">卧推 / 胸推</span>
                <span class="tag">中等</span>
              </div>
            </div>
            <div class="exercise-meta">
              <strong>4 组</strong>
              <span class="meta-dot"></span>
              <span>8-10 次</span>
              <span class="meta-dot"></span>
              <span>休息 1分30秒</span>
            </div>
          </div>
        </button>

        <button class="workout-card" type="button" data-workout>
          <div class="thumb">
            <img src="../../HealthApp/Assets.xcassets/Dumbbell%20Incline%20Bench%20Press.imageset/Dumbbell%20Incline%20Bench%20Press.png" alt="哑铃上斜卧推动作图">
          </div>
          <div class="workout-body">
            <div class="workout-copy">
              <div class="exercise-top">
                <div>
                  <h3 class="exercise-name">哑铃上斜卧推</h3>
                  <div class="exercise-english">Dumbbell Incline Bench Press</div>
                </div>
                <span class="status" aria-hidden="true"></span>
              </div>
              <div class="tags">
                <span class="tag primary">胸大肌</span>
                <span class="tag">卧推 / 胸推</span>
                <span class="tag">中等</span>
              </div>
            </div>
            <div class="exercise-meta">
              <strong>4 组</strong>
              <span class="meta-dot"></span>
              <span>8-10 次</span>
              <span class="meta-dot"></span>
              <span>休息 1分30秒</span>
            </div>
          </div>
        </button>

        <button class="workout-card" type="button" data-workout>
          <div class="thumb">
            <img src="../../HealthApp/Assets.xcassets/Cable%20Crossover.imageset/Cable%20Crossover.png" alt="绳索交叉夹胸动作图">
          </div>
          <div class="workout-body">
            <div class="workout-copy">
              <div class="exercise-top">
                <div>
                  <h3 class="exercise-name">绳索交叉夹胸</h3>
                  <div class="exercise-english">Cable Crossover</div>
                </div>
                <span class="status" aria-hidden="true"></span>
              </div>
              <div class="tags">
                <span class="tag primary">胸大肌</span>
                <span class="tag">飞鸟 / 夹胸</span>
                <span class="tag">简单</span>
              </div>
            </div>
            <div class="exercise-meta">
              <strong>3 组</strong>
              <span class="meta-dot"></span>
              <span>12 次</span>
              <span class="meta-dot"></span>
              <span>休息 1 分钟</span>
            </div>
          </div>
        </button>

        <button class="workout-card" type="button" data-workout>
          <div class="thumb">
            <img src="../../HealthApp/Assets.xcassets/Push%20Ups.imageset/Push%20Ups.png" alt="俯卧撑动作图">
          </div>
          <div class="workout-body">
            <div class="workout-copy">
              <div class="exercise-top">
                <div>
                  <h3 class="exercise-name">俯卧撑</h3>
                  <div class="exercise-english">Push Ups</div>
                </div>
                <span class="status" aria-hidden="true"></span>
              </div>
              <div class="tags">
                <span class="tag primary">胸大肌</span>
                <span class="tag">自重训练</span>
                <span class="tag">简单</span>
              </div>
            </div>
            <div class="exercise-meta">
              <strong>3 组</strong>
              <span class="meta-dot"></span>
              <span>做到接近力竭</span>
              <span class="meta-dot"></span>
              <span>休息 1 分钟</span>
            </div>
          </div>
        </button>
      </div>

      <aside class="coach-note">
        <strong>节奏提示</strong>
        下放保持控制，推起时呼气。每个动作先确认肩胛稳定，再进入正式重量。
      </aside>
    </section>

    <section class="section" id="cooldown">
      <div class="section-header">
        <h2>拉伸</h2>
        <span>约 5 分钟</span>
      </div>
      <div class="rail" aria-label="拉伸动作">
        <article class="mini-card">
          <span class="mini-dot">01</span>
          <div class="mini-title">门框胸肌拉伸</div>
          <div class="mini-value">左右各 30 秒</div>
        </article>
        <article class="mini-card">
          <span class="mini-dot">02</span>
          <div class="mini-title">跪姿胸椎伸展</div>
          <div class="mini-value">30 秒</div>
        </article>
        <article class="mini-card">
          <span class="mini-dot">03</span>
          <div class="mini-title">肩前束放松</div>
          <div class="mini-value">左右各 30 秒</div>
        </article>
      </div>
    </section>
  </main>

  <footer class="bottom-bar">
    <div class="bottom-inner">
      <div class="progress-pill">
        <strong data-bottom-title>准备开始</strong>
        <span data-bottom-copy>完成 0 个正式动作</span>
      </div>
      <button class="start-button" type="button" data-start>开始训练</button>
    </div>
  </footer>

  <script>
    const steps = Array.from(document.querySelectorAll("[data-jump]"));
    const sections = steps.map((step) => document.getElementById(step.dataset.jump));
    const workoutCards = Array.from(document.querySelectorAll("[data-workout]"));
    const progress = document.querySelector("[data-progress]");
    const bottomTitle = document.querySelector("[data-bottom-title]");
    const bottomCopy = document.querySelector("[data-bottom-copy]");
    const startButton = document.querySelector("[data-start]");

    function setActiveStep(id) {
      steps.forEach((step) => {
        step.classList.toggle("is-active", step.dataset.jump === id);
      });
    }

    function updateProgress() {
      const done = workoutCards.filter((card) => card.classList.contains("is-done")).length;
      progress.textContent = `${done} / ${workoutCards.length} 完成`;
      bottomTitle.textContent = done === 0 ? "准备开始" : done === workoutCards.length ? "正式训练完成" : "训练进行中";
      bottomCopy.textContent = `完成 ${done} 个正式动作`;
      startButton.textContent = done === 0 ? "开始训练" : done === workoutCards.length ? "查看总结" : "继续训练";
    }

    steps.forEach((step) => {
      step.addEventListener("click", () => {
        const target = document.getElementById(step.dataset.jump);
        setActiveStep(step.dataset.jump);
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });

    workoutCards.forEach((card) => {
      card.addEventListener("click", () => {
        card.classList.toggle("is-done");
        updateProgress();
      });
    });

    startButton.addEventListener("click", () => {
      document.getElementById("workout").scrollIntoView({ behavior: "smooth", block: "start" });
      setActiveStep("workout");
    });

    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (visible) {
        setActiveStep(visible.target.id);
      }
    }, {
      rootMargin: "-80px 0px -64% 0px",
      threshold: [0.12, 0.3, 0.6]
    });

    sections.forEach((section) => observer.observe(section));
    updateProgress();
  </script>
</body>
</html>
